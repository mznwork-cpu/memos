<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h2>今日のメモ</h2>
<input id="text" placeholder="入力">
<button onclick="save()">保存</button>

<ul id="list"></ul>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  'https://jsdjxrccaehfecsaxfsj.supabase.co',
  'sb_publishable_uCOtuSfKhbpL6y2taiW9xw_LL8JncUr'
)

const list = document.getElementById("list")

// 表示
async function load() {
  const { data } = await supabase.from('memos').select('*').order('created_at', { ascending: false })
  list.innerHTML = ""
  data.forEach(item => {
    list.innerHTML += `<li>${item.text}</li>`
  })
}

load()

// 保存
window.save = async () => {
  const text = document.getElementById("text").value

  await supabase.from('memos').insert([{ text }])

  document.getElementById("text").value = ""
  load()
}
</script>

</body>
</html>
